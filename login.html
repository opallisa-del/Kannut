<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kannut — Iniciar Sesión</title>
    <meta name="description" content="Kanut es tu gestor de inversiones y rentas pasivas." />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Existing CSS -->
    <link rel="stylesheet" href="design-system.css" />
    <link rel="stylesheet" href="styles2.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'><svg class='ds-svg' viewBox='0 0 24 24'><polygon points='12 2 2 7 12 22 22 7 12 2'></polygon></svg></text></svg>" />

    <style>
        /* Specific overrides for Login page */
        html,
        body {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--ds-bg-color);
            position: relative;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 10;
        }

        .auth-logo-box {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease;
        }

        .auth-icon-wrap {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: var(--ds-fg-color);
        }

        .auth-subtitle {
            font-size: 1rem;
            color: var(--ds-muted);
        }

        .auth-card {
            background: var(--ds-surface-1);
            border: 1px solid var(--ds-border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 24px 48px -12px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--ds-muted);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-tab.active {
            background: var(--ds-fg-color);
            color: var(--ds-bg-color);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .auth-tab:not(.active) {
            border-color: var(--ds-border-color);
        }

        .auth-tab:not(.active):hover {
            background: var(--ds-surface-2);
            color: var(--ds-fg-color);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--ds-fg-color);
        }

        .forgot-link {
            color: var(--ds-primary-color);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: var(--ds-muted);
            width: 18px;
            height: 18px;
        }

        .auth-input {
            width: 100%;
            background: var(--ds-bg-color);
            border: 1px solid var(--ds-border-color);
            border-radius: 12px;
            padding: 12px 12px 12px 40px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--ds-fg-color);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-input:focus {
            border-color: var(--ds-primary-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: var(--ds-primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: #4f46e5;
        }

        .auth-divider {
            position: relative;
            margin: 1.5rem 0;
            text-align: center;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--ds-border-color);
            z-index: 1;
        }

        .auth-divider span {
            position: relative;
            z-index: 2;
            background: var(--ds-surface-1);
            padding: 0 10px;
            color: var(--ds-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-outline {
            width: 100%;
            background: transparent;
            border: 1px solid var(--ds-border-color);
            color: var(--ds-fg-color);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            margin-bottom: 1rem;
        }

        .btn-outline:hover {
            background: var(--ds-surface-2);
        }

        .footer-note {
            text-align: center;
            color: var(--ds-muted);
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        .nav-back {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--ds-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
            z-index: 20;
        }

        .nav-back:hover {
            color: var(--ds-fg-color);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Subtle hero glow for login bg */
        .login-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body class="ds-applied">

    <div class="login-glow"></div>

    <a href="index.html" class="nav-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Volver a Kannut
    </a>

    <div class="auth-container">
        <!-- Logo Header -->
        <div class="auth-logo-box">
            <div class="auth-icon-wrap">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                    <polyline points="16 7 22 7 22 13"></polyline>
                </svg>
            </div>
            <h1 class="auth-title">Kannut</h1>
            <p class="auth-subtitle">Tu gestor de inversiones y rentas pasivas</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Iniciar sesión
                </button>
                <button class="auth-tab" onclick="switchTab('register')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                    Registrarse
                </button>
            </div>

            <form action="index.html" method="get">
                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" class="auth-input" placeholder="tu@email.com" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="form-label">
                        <span>Contraseña</span>
                        <a href="#" class="forgot-link" id="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" class="auth-input" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-submit" id="submit-btn">
                    Iniciar sesión
                </button>
            </form>

            <div class="auth-divider">
                <span>o continúa con</span>
            </div>

            <!-- Social/Biometric -->
            <button class="btn-outline">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="currentColor"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="currentColor"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="currentColor"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Continuar con Google
            </button>

            <button class="btn-outline" style="border-color: rgba(99, 102, 241, 0.4); margin-bottom: 0;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12a10 10 0 0 1-10 10A10 10 0 0 1 2 12A10 10 0 0 1 12 2a10 10 0 0 1 10 10z"></path>
                    <path d="M12 16v-4"></path>
                    <path d="M12 8h.01"></path>
                    <path d="M16 12h.01"></path>
                    <path d="M8 12h.01"></path>
                    <path d="M12 18h.01"></path>
                </svg>
                Iniciar con Face ID / Touch ID
            </button>
        </div>

        <p class="footer-note">Tus datos están seguros y encriptados</p>
    </div>

    <script>
        function switchTab(mode) {
            const tabs = document.querySelectorAll('.auth-tab');
            const btn = document.getElementById('submit-btn');
            const forgotLink = document.getElementById('forgot-link');

            tabs.forEach(t => t.classList.remove('active'));

            if (mode === 'login') {
                tabs[0].classList.add('active');
                btn.textContent = 'Iniciar sesión';
                forgotLink.style.display = 'block';
            } else {
                tabs[1].classList.add('active');
                btn.textContent = 'Crear cuenta';
                forgotLink.style.display = 'none';
            }
        }
    </script>
</body>

</html>
